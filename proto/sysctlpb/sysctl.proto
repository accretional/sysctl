syntax = "proto3";

package sysctl;

option go_package = "github.com/accretional/sysctl/proto/sysctlpb";

import "google/protobuf/duration.proto";

// SysctlService provides access to macOS kernel metrics via sysctl.
service SysctlService {
  // GetMetrics returns multiple sysctl metrics by name.
  rpc GetMetrics(GetMetricsRequest) returns (GetMetricsResponse);

  // GetMetricsByCategory returns all metrics in a category.
  rpc GetMetricsByCategory(GetMetricsByCategoryRequest) returns (GetMetricsResponse);

  // Subscribe streams metric deltas at a client-requested interval.
  // Only metrics whose raw value changed since the last push are included.
  // The server rejects intervals faster than min_interval_ns from the registry.
  // Computed metrics are not supported — use GetMetrics for those.
  rpc Subscribe(SubscribeRequest) returns (stream SubscribeResponse);

  // ListKnownMetrics returns all known/supported metric names.
  rpc ListKnownMetrics(ListKnownMetricsRequest) returns (ListKnownMetricsResponse);

  // ListCategories returns all metric categories.
  rpc ListCategories(ListCategoriesRequest) returns (ListCategoriesResponse);

  // GetKernelRegistry returns the kernel metric registry for this platform.
  rpc GetKernelRegistry(GetKernelRegistryRequest) returns (GetKernelRegistryResponse);
}

message GetKernelRegistryRequest {}
message GetKernelRegistryResponse {
  KernelMetricRegistry registry = 1;
  int64 min_interval_ns = 2; // fastest Subscribe interval the server supports
}

message GetMetricsRequest {
  repeated string names = 1;
}

message SubscribeRequest {
  repeated string names = 1;     // metrics to stream (computed not supported)
  int64 interval_ns = 2;         // desired push interval in nanoseconds
}

message SubscribeResponse {
  int64 timestamp_ns = 1;            // server-side unix nanos when metrics were read
  repeated MetricDelta deltas = 2;   // only changed metrics
  repeated string errors = 3;        // per-stream errors (unknown names, computed, etc.)
}

// MetricDelta is a single changed metric value as raw sysctl bytes.
// The client uses the KernelMetricRegistry to interpret the type.
message MetricDelta {
  string name = 1;
  bytes value = 2;
}

message GetMetricsResponse {
  repeated Metric metrics = 1;
}

message GetMetricsByCategoryRequest {
  string category = 1; // e.g. "vm.compressor", "hw.cpu"
}

message ListKnownMetricsRequest {
  string category = 1; // optional: filter by category
}

message ListKnownMetricsResponse {
  KernelMetricRegistry registry = 1;
}

message ListCategoriesRequest {}

message ListCategoriesResponse {
  repeated CategoryInfo categories = 1;
}

message CategoryInfo {
  string name = 1;
  int32 metric_count = 2;
}

// Metric is a sysctl value with type information.
message Metric {
  string name = 1;
  string category = 9;
  oneof value {
    string string_value = 2;
    uint64 uint64_value = 3;
    int64 int64_value = 4;
    uint32 uint32_value = 5;
    int32 int32_value = 6;
    bytes raw_value = 7;
    StructValue struct_value = 10;
  }
  string error = 8; // non-empty if the metric could not be read
}

// StructValue holds parsed structured sysctl values.
message StructValue {
  string type_name = 1; // "timeval", "loadavg", "swap", "clock"
  map<string, string> fields = 2; // human-readable field name -> string value
}

// MetricInfo describes a known sysctl metric.
message MetricInfo {
  string name = 1;
  string description = 2;
  string value_type = 3; // "string", "uint64", "int32", "timeval", "loadavg", etc.
  string category = 4;
}

// How a metric is accessed / cached by the server.
enum AccessPattern {
  ACCESS_PATTERN_UNSPECIFIED = 0;  // Inherit default or fall back to DYNAMIC
  STATIC = 1;                     // Read once at startup, never refreshed
  POLLED = 2;                     // Background refresh at ttl interval, serve from cache
  CONSTRAINED = 3;                // Mutable via OS/sandbox/process configuration
  DYNAMIC = 4;                    // Read live on every request
  DISABLED = 5;                   // Never read, return error if requested
}

// AccessConfig pairs an access pattern with a TTL.
// TTL is used by POLLED (poll interval) and CONSTRAINED (check interval).
// Ignored for STATIC, DYNAMIC, and DISABLED.
message AccessConfig {
  AccessPattern pattern = 1;
  google.protobuf.Duration ttl = 2;
}

// KernelMetric describes a metric: its identity, how the kernel treats it,
// and what access pattern is recommended for monitoring.
message KernelMetric {
  string name = 1;
  string description = 5;
  string value_type = 6;   // "string", "uint64", "int32", "timeval", etc.
  string category = 7;
  AccessConfig kernel_access_pattern = 2;     // How the kernel implements it
  AccessConfig recommended_access_pattern = 3; // What clients should use
  string notes = 4;
}

// KernelMetricRegistry is the full set of kernel metric descriptors
// for a specific OS / architecture combination.
message KernelMetricRegistry {
  string os_registry = 1;  // e.g. "darwin-arm64"
  string os_version = 2;   // e.g. "Darwin 24.6.0 / xnu-11417"
  repeated KernelMetric metrics = 3;
}
